<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Studio Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        
        /* Layout */
        .sidebar { background-color: #0f172a; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; padding: 24px; color: white; z-index: 50; }
        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; width: calc(100% - 260px); }

        /* Navigation */
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 16px; 
            color: #94a3b8; border-radius: 12px; text-decoration: none; 
            font-weight: 700; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .nav-link:hover, .nav-link.active { background-color: #2563eb; color: white; }

        /* Sections */
        .page-section { display: none; }
        .page-section:target, .page-section.default { display: block; }

        /* Cards & UI */
        .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
        .invoice-card { background: #0f172a; border-radius: 24px; color: white; padding: 32px; height: fit-content; }
        input, select { background-color: #f1f5f9; border: none; border-radius: 12px; padding: 12px; outline: none; width: 100%; }
        
        .btn-blue { background-color: #2563eb; color: white; padding: 12px 24px; border-radius: 16px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="bg-blue-600 p-2 rounded-xl"><i class="fas fa-camera text-white"></i></div>
            <h1 class="text-white font-extrabold tracking-tight">SIGMA STUDIO</h1>
        </div>
        
        <nav>
            <a href="#dashboard" class="nav-link active" onclick="updateNav(this)"><i class="fas fa-th-large"></i> Dashboard
