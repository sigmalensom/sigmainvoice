<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Studio Manager - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #0f172a; min-height: 100vh; }
        .nav-item { color: #94a3b8; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: white; background-color: #2563eb; border-radius: 8px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div class="flex">
    <div class="sidebar w-64 p-5 fixed h-full">
        <div class="flex items-center space-x-3 mb-10 p-2 bg-blue-600 rounded-lg">
            <i class="fas fa-camera text-white text-xl"></i>
            <span class="text-white font-bold text-lg">SIGMA STUDIO</span>
        </div>
        <nav class="space-y-2">
            <div onclick="showSection('dashboard')" id="nav-dashboard" class="nav-item active p-3 flex items-center space-x-3"><i class="fas fa-th-large w-5"></i> <span>Dashboard</span></div>
            <div onclick="showSection('billing')" id="nav-billing" class="nav-item p-3 flex items-center space-x-3"><i class="fas fa-shopping-cart w-5"></i> <span>Create Bill</span></div>
            <div onclick="showSection('invoices')" id="nav-invoices" class="nav-item p-3 flex items-center space-x-3"><i class="fas fa-file-invoice w-5"></i> <span>Invoices</span></div>
            <div onclick="showSection('inventory')" id="nav-inventory" class="nav-item p-3 flex items-center space-x-3"><i class="fas fa-box w-5"></i> <span>Inventory</span></div>
        </nav>
    </div>

    <div class="ml-64 w-full p-8">
        <div id="dashboard" class="section active">
            <h1 class="text-3xl font-bold text-slate-800 mb-8">Dashboard</h1>
            <div class="grid grid-cols-2 gap-6">
                <div class="card p-6 h-40 flex items-center justify-center">
                    <div class="text-center">
                        <p class="text-slate-500">Total Sales Today</p>
                        <h2 id="dash-sales" class="text-3xl font-bold text-blue-600">0.000</h2>
                    </div>
                </div>
                <div class="card p-6 h-40 flex items-center justify-center">
                    <div class="text-center">
                        <p class="text-slate-500">Items in Inventory</p>
                        <h2 id="dash-inv-count" class="text-3xl font-bold text-slate-800">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div id="billing" class="section">
            <h1 class="text-3xl font-bold text-slate-800 mb-8">Billing Counter</h1>
            <div class="grid grid-cols-3 gap-6">
                <div class="col-span-2 space-y-6">
                    <div class="card p-6">
                        <h3 class="text-blue-600 font-bold mb-4">Customer Details</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="cust-name" type="text" placeholder="Client Name" class="p-3 bg-slate-50 border rounded-lg">
                            <input id="cust-phone" type="text" placeholder="+968 Phone" class="p-3 bg-slate-50 border rounded-lg">
                        </div>
                    </div>
                    <div class="card p-6">
                        <h3 class="text-blue-600 font-bold mb-4">Add Items</h3>
                        <div class="flex space-x-4">
                            <select id="item-select" class="flex-1 p-3 bg-slate-50 border rounded-lg"></select>
                            <input id="item-qty" type="number" value="1" class="w-20 p-3 bg-slate-50 border rounded-lg text-center">
                            <button onclick="addToCart()" class="bg-slate-900 text-white px-8 rounded-lg hover:bg-black">ADD</button>
                        </div>
                    </div>
                </div>
                <div class="card p-6 border-t-8 border-slate-900">
                    <h3 class="font-bold mb-4">INVOICE SUMMARY</h3>
                    <div id="cart-items" class="space-y-2 mb-4 text-sm h-40 overflow-y-auto">
                        <p class="text-slate-400 text-center py-10">Cart is empty</p>
                    </div>
                    <div class="border-t pt-4 flex justify-between items-center mb-6">
                        <span class="font-bold">GRAND TOTAL</span>
                        <span id="grand-total" class="text-2xl font-bold text-blue-600">0.000</span>
                    </div>
                    <button onclick="generateInvoice()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">GENERATE INVOICE</button>
                </div>
            </div>
        </div>

        <div id="invoices" class="section">
            <h1 class="text-3xl font-bold text-slate-800 mb-8">Invoice Registry</h1>
            <div id="invoice-list" class="space-y-4">
                <div class="card p-10 text-center text-slate-400">No invoices yet.</div>
            </div>
        </div>

        <div id="inventory" class="section">
            <h1 class="text-3xl font-bold text-slate-800 mb-8">Inventory</h1>
            <div class="grid grid-cols-4 gap-6">
                <div class="col-span-3 card p-6">
                    <table class="w-full">
                        <thead class="text-slate-400 text-sm border-b">
                            <tr><th class="text-left pb-2">ITEM</th><th class="text-right pb-2">PRICE</th><th class="text-right pb-2">STOCK</th></tr>
                        </thead>
                        <tbody id="inventory-table"></tbody>
                    </table>
                </div>
                <div class="card p-6">
                    <h3 class="text-blue-600 font-bold mb-4">+ Add Stock</h3>
                    <input id="new-item-name" type="text" placeholder="Item Name" class="w-full p-2 mb-2 border rounded">
                    <input id="new-item-price" type="number" placeholder="Price" class="w-full p-2 mb-2 border rounded">
                    <input id="new-item-stock" type="number" placeholder="Stock" class="w-full p-2 mb-4 border rounded">
                    <button onclick="addInventoryItem()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Add to Assets</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('inventory')) || [
        { name: 'Sony A1 Body', price: 2500, stock: 2 },
        { name: '85mm f1.4 Lens', price: 600, stock: 5 }
    ];
    let cart = [];
    let invoices = JSON.parse(localStorage.getItem('invoices')) || [];

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        updateUI();
    }

    function addInventoryItem() {
        const name = document.getElementById('new-item-name').value;
        const price = parseFloat(document.getElementById('new-item-price').value);
        const stock = parseInt(document.getElementById('new-item-stock').value);
        if(name && price) {
            inventory.push({ name, price, stock });
            localStorage.setItem('inventory', JSON.stringify(inventory));
            updateUI();
        }
    }

    function updateUI() {
        // Update Inventory Table
        const table = document.getElementById('inventory-table');
        table.innerHTML = '';
        const select = document.getElementById('item-select');
        select.innerHTML = '<option value="">-- Select Item --</option>';
        
        inventory.forEach((item, index) => {
            table.innerHTML += `<tr class="border-b text-sm"><td class="py-3">${item.name}</td><td class="text-right">${item.price.toFixed(3)}</td><td class="text-right">${item.stock}</td></tr>`;
            select.innerHTML += `<option value="${index}">${item.name} (${item.price})</option>`;
        });

        document.getElementById('dash-inv-count').innerText = inventory.length;
        renderInvoices();
    }

    function addToCart() {
        const idx = document.getElementById('item-select').value;
        const qty = parseInt(document.getElementById('item-qty').value);
        if(idx !== "") {
            const item = inventory[idx];
            cart.push({ ...item, qty });
            renderCart();
        }
    }

    function renderCart() {
        const cartDiv = document.getElementById('cart-items');
        cartDiv.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            cartDiv.innerHTML += `<div class="flex justify-between"><span>${item.name} x${item.qty}</span><span>${(item.price * item.qty).toFixed(3)}</span></div>`;
        });
        document.getElementById('grand-total').innerText = total.toFixed(3);
    }

    function generateInvoice() {
        if(cart.length === 0) return alert("Cart is empty!");
        const inv = {
            id: 'INV-' + Date.now(),
            customer: document.getElementById('cust-name').value || 'Walking Customer',
            total: document.getElementById('grand-total').innerText,
            date: new Date().toLocaleDateString()
        };
        invoices.push(inv);
        localStorage.setItem('invoices', JSON.stringify(invoices));
        cart = [];
        renderCart();
        alert("Invoice Generated!");
        showSection('invoices');
    }

    function renderInvoices() {
        const list = document.getElementById('invoice-list');
        if(invoices.length === 0) return;
        list.innerHTML = '';
        invoices.forEach(inv => {
            list.innerHTML += `<div class="card p-4 flex justify-between items-center">
                <div><p class="font-bold">${inv.id}</p><p class="text-xs text-slate-500">${inv.customer} | ${inv.date}</p></div>
                <div class="text-blue-600 font-bold">${inv.total} OMR</div>
            </div>`;
        });
    }

    updateUI();
</script>
</body>
</html>
