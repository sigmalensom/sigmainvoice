<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Studio Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; }
        
        /* SIDEBAR */
        .sidebar { background-color: #0f172a; width: 260px; height: 100vh; position: fixed; left: 0; top: 0; padding: 24px; color: white; border-right: 1px solid #1e293b; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 18px; color: #94a3b8; border-radius: 12px; font-weight: 600; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
        .nav-link.active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .nav-link:hover:not(.active) { background-color: rgba(255,255,255,0.05); color: white; }

        .main-content { margin-left: 260px; padding: 40px; }
        
        /* CARDS & UI ELEMENTS */
        .card { background: white; border-radius: 24px; padding: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .input-field { background-color: #f8fafc; border: 1px solid #f1f5f9; border-radius: 16px; padding: 14px 20px; width: 100%; outline: none; font-size: 14px; font-weight: 500; color: #475569; }
        .input-field::placeholder { color: #cbd5e1; }
        
        /* BILLING SUMMARY CARD */
        .summary-card { background: #fff; border-radius: 30px; border: 1px solid #f1f5f9; box-shadow: 0 10px 40px rgba(0,0,0,0.05); overflow: hidden; }
        .summary-header { background: #0f172a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        .page-section { display: none; }
        .page-section.active { display: block; }
        
        .btn-add { background: #0f172a; color: white; padding: 0 30px; border-radius: 12px; font-weight: 700; font-size: 12px; letter-spacing: 1px; }
        .btn-confirm { background: #94a3b8; color: white; width: 100%; padding: 16px; border-radius: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="flex items-center gap-3 mb-12 px-2">
            <div class="bg-blue-600 p-2.5 rounded-xl"><i class="fas fa-camera text-white"></i></div>
            <div>
                <h1 class="text-white font-extrabold text-lg leading-tight">SIGMA STUDIO</h1>
            </div>
        </div>
        <nav>
            <div onclick="showPage('dashboard')" id="nav-dashboard" class="nav-link active"><i class="fas fa-th-large w-5 text-center"></i> Dashboard</div>
            <div onclick="showPage('billing')" id="nav-billing" class="nav-link"><i class="fas fa-shopping-cart w-5 text-center"></i> Create Bill</div>
            <div onclick="showPage('invoices')" id="nav-invoices" class="nav-link"><i class="fas fa-file-invoice w-5 text-center"></i> Invoices</div>
            <div onclick="showPage('inventory')" id="nav-inventory" class="nav-link"><i class="fas fa-box w-5 text-center"></i> Inventory</div>
        </nav>
        <div class="absolute bottom-8 left-6 right-6 pt-6 border-t border-slate-800/50">
            <div class="nav-link"><i class="fas fa-cog w-5 text-center"></i> Settings</div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="page-section active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-extrabold text-slate-900">Dashboard</h2>
                <button onclick="showPage('billing')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200">+ New Invoice</button>
            </div>
            </div>

        <div id="billing" class="page-section">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-10">Billing Counter</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <div class="lg:col-span-8 space-y-8">
                    <div class="card">
                        <div class="flex items-center gap-3 mb-8">
                            <i class="far fa-user text-blue-500 text-lg"></i>
                            <h3 class="font-bold text-slate-800">Customer Details</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <input type="text" placeholder="Client Name" class="input-field md:col-span-2">
                            <input type="text" placeholder="+968" class="input-field">
                            <input type="text" placeholder="Address / Location" class="input-field">
                        </div>
                    </div>

                    <div class="card">
                        <div class="flex items-center gap-3 mb-8">
                            <i class="fas fa-box-open text-blue-500 text-lg"></i>
                            <h3 class="font-bold text-slate-800">Add Items to Bill</h3>
                        </div>
                        <div class="flex gap-4">
                            <select class="input-field flex-grow appearance-none">
                                <option>-- Select an Item --</option>
                            </select>
                            <div class="relative w-24">
                                <span class="absolute -top-6 left-0 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Qty</span>
                                <input type="number" value="1" class="input-field text-center">
                            </div>
                            <button class="btn-add">ADD</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4">
                    <div class="summary-card">
                        <div class="summary-header">
                            <h4 class="text-[11px] font-bold tracking-widest uppercase">Invoice Summary</h4>
                            <i class="fas fa-shopping-cart text-sm"></i>
                        </div>
                        <div class="p-8">
                            <div class="py-20 flex flex-col items-center justify-center text-slate-200">
                                <i class="fas fa-shopping-basket text-4xl mb-4"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest">Empty Cart</p>
                            </div>
                            
                            <div class="border-t border-slate-100 pt-6 mt-6">
                                <div class="flex justify-between items-end mb-8">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Grand Total</span>
                                    <span class="text-3xl font-black text-blue-600">0.000</span>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mb-6">
                                    <select class="input-field text-[11px] font-bold py-2"><option>MARK PAID</option></select>
                                    <select class="input-field text-[11px] font-bold py-2"><option>CASH</option></select>
                                </div>
                                <button class="btn-confirm">Confirm & Generate</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="invoices" class="page-section">
            <h2 class="text-3xl font-extrabold text-slate-900 mb-10">Invoice Registry</h2>
            <div class="card min-h-[400px] flex flex-col items-center justify-center text-center">
                <i class="far fa-file-alt text-5xl text-slate-100 mb-4"></i>
                <p class="text-slate-300 font-medium">No invoices found in registry</p>
            </div>
        </div>

        <div id="inventory" class="page-section">
             <h2 class="text-3xl font-extrabold text-slate-900 mb-10">Inventory Management</h2>
             </div>

    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }
    </script>
</body>
</html>
